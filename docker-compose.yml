services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - next_cache:/app/.next
    env_file:
      - .env
    environment:
      # next@14.2.35はswcを14.2.33で出荷しており、起動時のlockfile自動修正が
      # 存在しないバージョンを参照してクラッシュする（Next側のリリース不整合）。
      # 公式の無効化フラグで自動修正をスキップする。
      NEXT_IGNORE_INCORRECT_LOCKFILE: "1"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: nursing_support
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  node_modules:
  next_cache:
  postgres_data:
